<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .mainpage {
            display: flex;
            flex-direction: column;
            text-align: center;
            align-items: center;
        }

        .content {
            background-image: linear-gradient(to bottom, lightgray, black);
            width: 50%;
        }

        .scene1 {
            width: 100%;
            height: 2600px;
            background-color: gray;
            color: rgba(255, 255, 255, 0.79);
            /* 자식 요소인 글자의 기준점 */
            position: relative;
            /* 이미지가 삐져나가지 않게 방지 */
            overflow: hidden;
        }

        .scene1 img {
            width: 100%;
            height: 100%;
            /* 이미지가 비율에 꽉 차게 */
            object-fit: cover;
        }

        .scene2 {
            width: 100%;
            height: 600px;
            background-color: #1a1a1a;
            color: rgba(255, 255, 255, 0.431);
            position: relative;
            overflow: hidden;
        }

        .scene3 {
            width: 100%;
            height: 600px;
        }

        .scene4 {
            width: 100%;
            height: 600px;
        }

        .overlay-text {
            position: absolute;
            /* 부모인 .scene1을 기준으로 배치됩니다 */
            top: 50%;
            /* 위에서 50% 지점 */
            left: 50%;
            /* 왼쪽에서 50% 지점 */
            transform: translate(-50%, -50%);
            /* 정확히 정중앙 정렬 */

            /* 글자가 잘 보이게 하는 스타일들 */
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            /* 글자 그림자로 가독성 확보 */
            z-index: 10;
            /* 이미지보다 위에 오도록 설정 */
        }
    </style>
</head>

<body>
    <div class="mainpage">
        <div class="content">
            <div class="scene1"><img src="빛의선.png"></div>
            <div class="scene2">
                <span class="overlay-text">퍽</span>
            </div>
            <div class="scene3">전</div>
            <div class="scene4">결</div>
        </div>
    </div>
</body>

</html>
